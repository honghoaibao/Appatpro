name: AT PRO — Build APK

on:
  push:
    branches: [ main, dev, release/* ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (vd: 1.0.7)'
        required: true
        default:  '1.2.9'
      build:
        description: 'Build number'
        required: true
        default:  '31'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_ALIAS != '' }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # cần full history để tạo changelog

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ── Gradle Wrapper ─────────────────────────────────────────────────────────
    - name: Ensure Gradle wrapper jar (TD-CI-001 bootstrap)
      working-directory: android
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "gradle-wrapper.jar not committed — bootstrapping with pinned Gradle 8.3 (TD-CI-001)"
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip \
               -O /tmp/gradle-8.3-bin.zip
          unzip -q /tmp/gradle-8.3-bin.zip -d /tmp/gradle-8.3-dist
          /tmp/gradle-8.3-dist/gradle-8.3/bin/gradle \
            wrapper \
            --gradle-version 8.3 \
            --distribution-type all
          echo "OK: gradle-wrapper.jar generated by Gradle 8.3 (not system Gradle)"
          ls -lh gradle/wrapper/gradle-wrapper.jar
        else
          echo "OK: gradle-wrapper.jar present — skipping bootstrap"
        fi
        chmod +x gradlew

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-

    # ── Signing (tuỳ chọn) ─────────────────────────────────────────────────────
    - name: Setup signing (nếu có keystore)
      if: env.HAS_KEYSTORE == 'true'
      env:
        KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
        STORE_PASSWORD:   ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
      run: |
        mkdir -p android/keystore
        echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/atpro-release.jks
        cat > android/key.properties << PROPS
        storePassword=$STORE_PASSWORD
        keyPassword=$KEY_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=../keystore/atpro-release.jks
        PROPS
        echo "OK: Release signing configured"

    # ── Version ────────────────────────────────────────────────────────────────
    - name: Determine version
      id: ver
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VER="${{ github.event.inputs.version }}"
          BLD="${{ github.event.inputs.build }}"
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VER="${{ github.ref_name }}"; VER="${VER#v}"
          BLD="${{ github.run_number }}"
        else
          # v1.2.9 FIX: trước đây hardcode "1.2.8" — mỗi lần push thường (không
          # phải tag hay workflow_dispatch) đều build RA PHIÊN BẢN CŨ bất kể
          # build.gradle đã cập nhật lên bản nào. Giờ đọc trực tiếp từ
          # build.gradle đang có trong repo để luôn build đúng bản hiện tại.
          VER=$(grep -oP 'versionName\s+"v?\K[^"]+' android/app/build.gradle)
          BLD=$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)
          if [ -z "$VER" ]; then VER="0.0.0"; fi
          if [ -z "$BLD" ]; then BLD="${{ github.run_number }}"; fi
          echo "Fallback build — đọc version từ build.gradle: v$VER (build $BLD)"
        fi
        echo "version=$VER"  >> $GITHUB_OUTPUT
        echo "build=$BLD"    >> $GITHUB_OUTPUT

    - name: Update version in build.gradle
      run: |
        sed -i "s/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.build }}/" android/app/build.gradle
        sed -i "s/versionName \"v[^\"]*\"/versionName \"v${{ steps.ver.outputs.version }}\"/" android/app/build.gradle
        echo "versionCode → ${{ steps.ver.outputs.build }}"
        echo "versionName → v${{ steps.ver.outputs.version }}"
        grep -E "versionCode|versionName" android/app/build.gradle

    # ── Build ──────────────────────────────────────────────────────────────────
    - name: Build APK
      working-directory: android
      run: ./gradlew assembleRelease --stacktrace --warning-mode all

    - name: Rename APK
      run: |
        mkdir -p dist
        cp android/app/build/outputs/apk/release/app-release.apk dist/atpro.apk
        echo "APK: $(du -sh dist/atpro.apk | cut -f1)"

    # ── Upload artifact ────────────────────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: atpro-v${{ steps.ver.outputs.version }}-b${{ steps.ver.outputs.build }}
        path: dist/atpro.apk
        retention-days: 30

    # ── Upload problems report (on failure) ────────────────────────────────────
    - name: Upload Gradle problems report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-problems-report
        path: android/build/reports/problems/problems-report.html
        if-no-files-found: ignore
        retention-days: 7

    # ── GitHub Release (chỉ khi push tag) ─────────────────────────────────────

    # Tạo release notes động từ git log giữa tag hiện tại và tag trước
    - name: Generate changelog
      id: changelog
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG="${{ github.ref_name }}"
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

        if [ -n "$PREV_TAG" ]; then
          RANGE="${PREV_TAG}..${TAG}"
          SINCE_LINE="**Thay đổi từ:** \`${PREV_TAG}\`"
        else
          RANGE="HEAD"
          SINCE_LINE="**Release đầu tiên**"
        fi

        COMMITS=$(git log --pretty=format:"- %s (\`%h\`)" ${RANGE} | head -30)
        if [ -z "$COMMITS" ]; then
          COMMITS="- Không có commit mới"
        fi

        cat > /tmp/release_notes.md << NOTES
        ## AT PRO v${{ steps.ver.outputs.version }}

        ${SINCE_LINE}
        **Build:** \`${{ steps.ver.outputs.build }}\` | **Commit:** \`${{ github.sha }}\`

        ### Thay đổi
        ${COMMITS}

        ### Cài đặt
        1. Download \`atpro.apk\` bên dưới
        2. Mở file → cài đặt
        3. Settings → Accessibility → AT PRO Automation → Bật ON
        NOTES

        echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

    # v1.2.9 FIX: TRƯỚC ĐÂY bước Create GitHub Release chỉ chạy khi tag CHƯA có
    # release — nếu tag đã tồn tại release (vd: được tạo trước khi cấu hình
    # keystore secrets, hoặc build lỗi/thiếu sót), bước upload APK MỚI bị bỏ qua
    # HOÀN TOÀN. GitHub vẫn phục vụ file .apk CŨ trong release cũ mãi mãi, dù các
    # lần build sau đó có ký đúng key thế nào đi nữa — đây chính là nguyên nhân
    # gây lỗi "gói không hợp lệ" khi tự cập nhật: app tải về file .apk cũ/hỏng
    # từ release đã lỗi thời, không phải file vừa build.
    #
    # Giờ LUÔN ghi đè (create-or-update) mỗi khi build lại cùng tag —
    # softprops/action-gh-release@v2 tự động update release đã có (kèm thay thế
    # asset .apk cũ) nếu tag_name trùng, không cần bước check_release riêng nữa.
    - name: Create or update GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: AT PRO v${{ steps.ver.outputs.version }}
        body_path: /tmp/release_notes.md
        files: dist/atpro.apk
        fail_on_unmatched_files: true
        make_latest: true

    # ── Summary ────────────────────────────────────────────────────────────────
    - name: Summary
      run: |
        SIGNED=$([[ -f android/key.properties ]] && echo "Release (keystore)" || echo "Debug (unsigned)")
        RELEASE_STATUS=""
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          RELEASE_STATUS="| Release | Created/Updated: \`${{ github.ref_name }}\` (asset luôn được ghi đè) |"
        fi
        echo "## Build OK" >> $GITHUB_STEP_SUMMARY
        echo "| | |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| APK | \`atpro.apk\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Version | \`${{ steps.ver.outputs.version }}\` (build ${{ steps.ver.outputs.build }}) |" >> $GITHUB_STEP_SUMMARY
        echo "| Signing | $SIGNED |" >> $GITHUB_STEP_SUMMARY
        echo "| Size | $(du -sh dist/atpro.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
        if [ -n "$RELEASE_STATUS" ]; then
          echo "$RELEASE_STATUS" >> $GITHUB_STEP_SUMMARY
        fi
