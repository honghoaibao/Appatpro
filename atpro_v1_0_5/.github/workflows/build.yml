name: AT PRO — Build APK

on:
  push:
    branches: [ main, release/* ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (vd: 1.0.3)'
        required: true
        default:  '1.0.3'
      build:
        description: 'Build number'
        required: true
        default:  '1'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_ALIAS != '' }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ── Gradle Wrapper ─────────────────────────────────────────────────────────
    # gradlew + gradlew.bat + gradle-wrapper.properties are committed.
    # gradle-wrapper.jar is committed after running scripts/commit_gradle_wrapper.sh locally.
    #
    # TD-CI-001: If the jar is still absent (pre-commit state), this step bootstraps
    # it by downloading the pinned Gradle 8.3 binary — NOT the system Gradle — to
    # guarantee the jar is generated by the same version declared in
    # gradle-wrapper.properties. Once the jar is committed, this step runs in <1s
    # (jar present → skips download entirely).
    #
    # To resolve TD-CI-001 permanently and remove this step:
    #   bash scripts/commit_gradle_wrapper.sh   # requires local gradle or sdkman
    #   git push
    - name: Ensure Gradle wrapper jar (TD-CI-001 bootstrap)
      working-directory: android
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "gradle-wrapper.jar not committed — bootstrapping with pinned Gradle 8.3 (TD-CI-001)"
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip \
               -O /tmp/gradle-8.3-bin.zip
          unzip -q /tmp/gradle-8.3-bin.zip -d /tmp/gradle-8.3-dist
          /tmp/gradle-8.3-dist/gradle-8.3/bin/gradle \
            wrapper \
            --gradle-version 8.3 \
            --distribution-type all
          echo "✅ gradle-wrapper.jar generated by Gradle 8.3 (not system Gradle)"
          ls -lh gradle/wrapper/gradle-wrapper.jar
        else
          echo "✅ gradle-wrapper.jar present — skipping bootstrap"
        fi
        chmod +x gradlew

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: gradle-

    # ── Signing (tuỳ chọn) ─────────────────────────────────────────────────────
    - name: Setup signing (nếu có keystore)
      if: env.HAS_KEYSTORE == 'true'
      env:
        KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
        STORE_PASSWORD:   ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
      run: |
        mkdir -p android/keystore
        echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/atpro-release.jks
        cat > android/key.properties << PROPS
        storePassword=$STORE_PASSWORD
        keyPassword=$KEY_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=../keystore/atpro-release.jks
        PROPS
        echo "✅ Release signing configured"

    # ── Version ────────────────────────────────────────────────────────────────
    - name: Determine version
      id: ver
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VER="${{ github.event.inputs.version }}"
          BLD="${{ github.event.inputs.build }}"
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VER="${{ github.ref_name }}"; VER="${VER#v}"
          BLD="${{ github.run_number }}"
        else
          VER="1.0.3"
          BLD="${{ github.run_number }}"
        fi
        echo "version=$VER"  >> $GITHUB_OUTPUT
        echo "build=$BLD"    >> $GITHUB_OUTPUT

    - name: Update version in build.gradle
      run: |
        sed -i "s/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.build }}/" android/app/build.gradle
        sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.ver.outputs.version }}\"/" android/app/build.gradle

    # ── Build ──────────────────────────────────────────────────────────────────
    - name: Build APK
      working-directory: android
      run: ./gradlew assembleRelease --stacktrace --warning-mode all

    - name: Rename APK
      run: |
        mkdir -p dist
        cp android/app/build/outputs/apk/release/app-release.apk dist/atpro.apk
        echo "APK: $(du -sh dist/atpro.apk | cut -f1)"

    # ── Upload artifact ────────────────────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: atpro-v${{ steps.ver.outputs.version }}-b${{ steps.ver.outputs.build }}
        path: dist/atpro.apk
        retention-days: 30

    # ── Upload problems report (on failure) ────────────────────────────────────
    - name: Upload Gradle problems report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-problems-report
        path: android/build/reports/problems/problems-report.html
        if-no-files-found: ignore
        retention-days: 7

    # ── GitHub Release (chỉ khi push tag) ─────────────────────────────────────
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: AT PRO v${{ steps.ver.outputs.version }}
        body: |
          ## AT PRO v${{ steps.ver.outputs.version }}
          Build: ${{ steps.ver.outputs.build }} | Commit: ${{ github.sha }}

          ### Cài đặt
          1. Download `atpro.apk` bên dưới
          2. Cài → Settings → Accessibility → AT PRO Automation → Bật ON
        files: dist/atpro.apk

    # ── Summary ────────────────────────────────────────────────────────────────
    - name: Summary
      run: |
        SIGNED=$([[ -f android/key.properties ]] && echo "Release (keystore)" || echo "Debug (tạm thời)")
        echo "## ✅ Build xong" >> $GITHUB_STEP_SUMMARY
        echo "| | |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| APK | \`atpro.apk\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Version | \`${{ steps.ver.outputs.version }}\` (build ${{ steps.ver.outputs.build }}) |" >> $GITHUB_STEP_SUMMARY
        echo "| Signing | $SIGNED |" >> $GITHUB_STEP_SUMMARY
        echo "| Size | $(du -sh dist/atpro.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
