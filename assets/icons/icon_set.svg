<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Icon set preview — each icon 80x80 at 24dp -->

  <!-- 1. Farming icon (wheat/farm) -->
  <g transform="translate(10,20)">
    <circle cx="40" cy="40" r="36" fill="#6C63FF" fill-opacity="0.15"/>
    <!-- Stalk -->
    <line x1="40" y1="62" x2="40" y2="28" stroke="#6C63FF" stroke-width="3" stroke-linecap="round"/>
    <!-- Left grain -->
    <ellipse cx="31" cy="36" rx="7" ry="10" fill="#6C63FF" fill-opacity="0.8" transform="rotate(-20 31 36)"/>
    <!-- Right grain -->
    <ellipse cx="49" cy="36" rx="7" ry="10" fill="#6C63FF" fill-opacity="0.8" transform="rotate(20 49 36)"/>
    <!-- Top grain -->
    <ellipse cx="40" cy="24" rx="6" ry="9" fill="#6C63FF"/>
    <!-- Root lines -->
    <line x1="40" y1="62" x2="28" y2="70" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="40" y1="62" x2="52" y2="70" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">Farm</text>
  </g>

  <!-- 2. Device/phone icon -->
  <g transform="translate(90,20)">
    <circle cx="40" cy="40" r="36" fill="#10B981" fill-opacity="0.15"/>
    <rect x="24" y="16" width="32" height="52" rx="6" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <rect x="29" y="22" width="22" height="36" rx="3" fill="#10B981" fill-opacity="0.2"/>
    <circle cx="40" cy="62" r="3" fill="#10B981"/>
    <!-- Signal bars -->
    <rect x="31" y="34" width="4" height="8"  rx="2" fill="#10B981" fill-opacity="0.5"/>
    <rect x="38" y="30" width="4" height="12" rx="2" fill="#10B981" fill-opacity="0.7"/>
    <rect x="45" y="26" width="4" height="16" rx="2" fill="#10B981"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">Device</text>
  </g>

  <!-- 3. Schedule / clock icon -->
  <g transform="translate(170,20)">
    <circle cx="40" cy="40" r="36" fill="#F59E0B" fill-opacity="0.15"/>
    <circle cx="40" cy="40" r="22" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
    <!-- Clock hands -->
    <line x1="40" y1="40" x2="40" y2="24" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="52" y2="46" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="3" fill="#F59E0B"/>
    <!-- Tick marks -->
    <line x1="40" y1="20" x2="40" y2="23" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="57" x2="40" y2="60" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="57" y1="40" x2="60" y2="40" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="40" x2="23" y2="40" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">Schedule</text>
  </g>

  <!-- 4. Export icon -->
  <g transform="translate(250,20)">
    <circle cx="40" cy="40" r="36" fill="#EC4899" fill-opacity="0.15"/>
    <!-- Document -->
    <rect x="24" y="18" width="28" height="36" rx="4" fill="none" stroke="#EC4899" stroke-width="2.5"/>
    <!-- Fold corner -->
    <polyline points="42,18 50,18 50,26 42,26 42,18" fill="#EC4899" fill-opacity="0.3" stroke="#EC4899" stroke-width="1.5"/>
    <!-- Lines -->
    <line x1="29" y1="32" x2="45" y2="32" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="29" y1="38" x2="45" y2="38" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="29" y1="44" x2="38" y2="44" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <!-- Arrow up-right -->
    <line x1="38" y1="60" x2="53" y2="45" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="46,45 53,45 53,52" fill="none" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">Export</text>
  </g>

  <!-- 5. WebSocket / network icon -->
  <g transform="translate(330,20)">
    <circle cx="40" cy="40" r="36" fill="#6C63FF" fill-opacity="0.15"/>
    <!-- Center node -->
    <circle cx="40" cy="40" r="6" fill="#6C63FF"/>
    <!-- Satellite nodes -->
    <circle cx="20" cy="26" r="5" fill="#6C63FF" fill-opacity="0.7"/>
    <circle cx="60" cy="26" r="5" fill="#6C63FF" fill-opacity="0.7"/>
    <circle cx="20" cy="54" r="5" fill="#EC4899" fill-opacity="0.7"/>
    <circle cx="60" cy="54" r="5" fill="#10B981" fill-opacity="0.7"/>
    <!-- Connections -->
    <line x1="40" y1="40" x2="20" y2="26" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="40" y1="40" x2="60" y2="26" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="40" y1="40" x2="20" y2="54" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="40" y1="40" x2="60" y2="54" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Pulse ring -->
    <circle cx="40" cy="40" r="14" fill="none" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">WebSocket</text>
  </g>

  <!-- 6. Settings/Config gear icon -->
  <g transform="translate(410,20)">
    <circle cx="40" cy="40" r="36" fill="#374151" fill-opacity="0.5"/>
    <!-- Gear outer -->
    <circle cx="40" cy="40" r="14" fill="none" stroke="#9CA3AF" stroke-width="2.5"/>
    <!-- Gear center -->
    <circle cx="40" cy="40" r="6" fill="#9CA3AF"/>
    <!-- Gear teeth -->
    <rect x="37" y="22" width="6" height="8" rx="2" fill="#9CA3AF"/>
    <rect x="37" y="50" width="6" height="8" rx="2" fill="#9CA3AF"/>
    <rect x="22" y="37" width="8" height="6" rx="2" fill="#9CA3AF"/>
    <rect x="50" y="37" width="8" height="6" rx="2" fill="#9CA3AF"/>
    <rect x="26" y="25" width="6" height="8" rx="2" fill="#9CA3AF" transform="rotate(45 29 29)"/>
    <rect x="49" y="27" width="6" height="8" rx="2" fill="#9CA3AF" transform="rotate(-45 52 31)"/>
    <rect x="26" y="47" width="6" height="8" rx="2" fill="#9CA3AF" transform="rotate(-45 29 51)"/>
    <rect x="49" y="45" width="6" height="8" rx="2" fill="#9CA3AF" transform="rotate(45 52 49)"/>
    <text x="40" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9CA3AF">Config</text>
  </g>
</svg>
