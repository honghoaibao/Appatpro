<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Telegram icon -->
  <g transform="translate(10, 8)">
    <rect width="64" height="64" rx="16" fill="#229ED9"/>
    <!-- Paper plane -->
    <polygon points="12,32 52,16 40,52" fill="white" fill-opacity="0.9"/>
    <polygon points="30,36 52,16 40,52" fill="white" fill-opacity="0.6"/>
    <line x1="30" y1="36" x2="52" y2="16" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Telegram label -->
  <text x="42" y="76" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#6B7280">Telegram</text>

  <!-- Discord icon -->
  <g transform="translate(90, 8)">
    <rect width="64" height="64" rx="16" fill="#5865F2"/>
    <!-- Discord logo (simplified) -->
    <!-- Left eye/controller -->
    <ellipse cx="22" cy="28" rx="8" ry="9" fill="white"/>
    <!-- Right eye/controller -->
    <ellipse cx="42" cy="28" rx="8" ry="9" fill="white"/>
    <!-- Mouth/smile -->
    <path d="M 16 42 Q 32 50 48 42" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Left bump -->
    <path d="M 14 22 Q 14 14 22 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right bump -->
    <path d="M 50 22 Q 50 14 42 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Discord label -->
  <text x="122" y="76" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" fill="#6B7280">Discord</text>
</svg>
