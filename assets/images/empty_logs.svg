<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <defs>
    <linearGradient id="terminal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.03"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="40" y="30" width="220" height="160" rx="12" fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="40" y="30" width="220" height="32" rx="12" fill="#374151"/>
  <rect x="40" y="46" width="220" height="16" fill="#374151"/>
  <!-- Window dots -->
  <circle cx="62"  cy="46" r="6" fill="#EF4444" fill-opacity="0.7"/>
  <circle cx="82"  cy="46" r="6" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="102" cy="46" r="6" fill="#10B981" fill-opacity="0.7"/>
  <!-- Title text -->
  <text x="150" y="51" text-anchor="middle"
        font-family="monospace" font-size="10" fill="#9CA3AF">farm_logs</text>

  <!-- Terminal content lines (empty/faded) -->
  <text x="58" y="82" font-family="monospace" font-size="10" fill="#6C63FF" fill-opacity="0.6">$</text>
  <rect x="68" y="74" width="80" height="8" rx="2" fill="#374151" fill-opacity="0.5"/>

  <text x="58" y="100" font-family="monospace" font-size="10" fill="#10B981" fill-opacity="0.4">›</text>
  <rect x="68" y="93" width="120" height="8" rx="2" fill="#374151" fill-opacity="0.4"/>

  <text x="58" y="118" font-family="monospace" font-size="10" fill="#6B7280" fill-opacity="0.4">›</text>
  <rect x="68" y="111" width="60"  height="8" rx="2" fill="#374151" fill-opacity="0.3"/>

  <!-- Blinking cursor -->
  <rect x="58" y="130" width="8" height="12" rx="1" fill="#6C63FF" fill-opacity="0.7"/>

  <!-- Waiting indicator -->
  <circle cx="150" cy="170" r="16" fill="#0D0D14"/>
  <text x="150" y="175" text-anchor="middle" font-size="16" fill="#374151">⏳</text>

  <!-- Label -->
  <text x="150" y="212" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">
    Chưa có logs
  </text>
  <text x="150" y="230" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">
    Bắt đầu farm để xem logs realtime
  </text>
</svg>
