<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0D0D14"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#4B44CC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#BE185D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6C63FF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="200"/>

  <!-- Card shape with shadow -->
  <rect x="140" y="140" width="744" height="744" rx="140" fill="url(#card)" filter="url(#shadow)"/>

  <!-- Inner card highlight -->
  <rect x="140" y="140" width="744" height="300" rx="140" fill="white" fill-opacity="0.06"/>

  <!-- Letter A -->
  <!-- Left leg -->
  <rect x="230" y="620" width="72" height="190" rx="36" fill="white"/>
  <!-- Right leg -->
  <rect x="510" y="620" width="72" height="190" rx="36" fill="white"/>
  <!-- Left diagonal -->
  <rect x="228" y="314" width="72" height="360" rx="36" fill="white" transform="rotate(30 264 512)"/>
  <!-- Right diagonal -->
  <rect x="508" y="314" width="72" height="360" rx="36" fill="white" transform="rotate(-30 544 512)"/>
  <!-- Crossbar -->
  <rect x="296" y="540" width="220" height="60" rx="30" fill="white"/>

  <!-- Letter T -->
  <!-- Top bar -->
  <rect x="620" y="280" width="230" height="72" rx="36" fill="white"/>
  <!-- Stem -->
  <rect x="699" y="280" width="72" height="430" rx="36" fill="white"/>

  <!-- Accent dot bottom right -->
  <circle cx="820" cy="800" r="52" fill="url(#accent)"/>
  <!-- Dot inner glow -->
  <circle cx="820" cy="800" r="30" fill="white" fill-opacity="0.3"/>

  <!-- Version dots (top left, subtle) -->
  <circle cx="210" cy="210" r="12" fill="white" fill-opacity="0.15"/>
  <circle cx="250" cy="210" r="12" fill="white" fill-opacity="0.10"/>
  <circle cx="290" cy="210" r="12" fill="white" fill-opacity="0.06"/>
</svg>
