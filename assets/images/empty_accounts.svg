<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <defs>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circles (decorative) -->
  <circle cx="150" cy="110" r="90" fill="url(#p1)"/>
  <circle cx="150" cy="110" r="65" fill="#1A1A2E"/>

  <!-- Phone outline -->
  <rect x="108" y="40" width="84" height="140" rx="14"
        fill="#1A1A2E" stroke="#374151" stroke-width="2"/>
  <!-- Phone screen -->
  <rect x="115" y="54" width="70" height="110" rx="6" fill="#0D0D14"/>
  <!-- Phone notch -->
  <rect x="138" y="40" width="24" height="8" rx="4" fill="#374151"/>
  <!-- Phone home button -->
  <circle cx="150" cy="167" r="6" fill="#374151"/>

  <!-- TikTok logo placeholder on phone screen -->
  <circle cx="150" cy="98" r="18" fill="#6C63FF" fill-opacity="0.3"/>
  <text x="150" y="104" text-anchor="middle" font-size="16" fill="#6C63FF">♪</text>

  <!-- User cards floating -->
  <!-- Card 1 (left, faded) -->
  <rect x="40" y="80" width="56" height="34" rx="8"
        fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>
  <circle cx="57" cy="93" r="8" fill="#374151"/>
  <rect x="70" y="90" width="18" height="4" rx="2" fill="#374151"/>
  <rect x="70" y="97" width="12" height="3" rx="1.5" fill="#374151" fill-opacity="0.6"/>

  <!-- Card 2 (right, faded) -->
  <rect x="204" y="80" width="56" height="34" rx="8"
        fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>
  <circle cx="221" cy="93" r="8" fill="#374151"/>
  <rect x="234" y="90" width="18" height="4" rx="2" fill="#374151"/>
  <rect x="234" y="97" width="12" height="3" rx="1.5" fill="#374151" fill-opacity="0.6"/>

  <!-- Plus icon -->
  <circle cx="150" cy="195" r="22" fill="#6C63FF"/>
  <line x1="150" y1="184" x2="150" y2="206" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="139" y1="195" x2="161" y2="195" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Label -->
  <text x="150" y="238" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">
    Chưa có tài khoản
  </text>
  <text x="150" y="256" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">
    Nhấn + để thêm tài khoản TikTok
  </text>
</svg>
