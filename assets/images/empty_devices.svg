<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <defs>
    <linearGradient id="dev-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- WiFi signal rings -->
  <arc/>
  <path d="M 150 100 m -70 20 a 70 70 0 0 1 140 0" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <path d="M 150 100 m -50 20 a 50 50 0 0 1 100 0" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 150 100 m -30 20 a 30 30 0 0 1  60 0" fill="none" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Three phone devices -->
  <!-- Left phone (gray) -->
  <g transform="translate(42, 90)">
    <rect width="36" height="58" rx="6" fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>
    <rect x="4" y="8" width="28" height="40" rx="3" fill="#374151" fill-opacity="0.3"/>
    <circle cx="18" cy="52" r="3" fill="#374151"/>
  </g>

  <!-- Center phone (highlighted) -->
  <g transform="translate(122, 72)">
    <rect width="56" height="88" rx="10" fill="#1A1A2E" stroke="#6C63FF" stroke-width="2"/>
    <rect x="5" y="12" width="46" height="60" rx="5" fill="#6C63FF" fill-opacity="0.1"/>
    <circle cx="28" cy="78" r="5" fill="#6C63FF" fill-opacity="0.5"/>
    <!-- Screen content -->
    <rect x="10" y="20" width="36" height="6" rx="3" fill="#6C63FF" fill-opacity="0.4"/>
    <rect x="10" y="30" width="26" height="4" rx="2" fill="#374151"/>
    <rect x="10" y="38" width="30" height="4" rx="2" fill="#374151"/>
    <!-- Live indicator -->
    <circle cx="38" cy="22" r="4" fill="#10B981"/>
  </g>

  <!-- Right phone (gray) -->
  <g transform="translate(222, 90)">
    <rect width="36" height="58" rx="6" fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>
    <rect x="4" y="8" width="28" height="40" rx="3" fill="#374151" fill-opacity="0.3"/>
    <circle cx="18" cy="52" r="3" fill="#374151"/>
  </g>

  <!-- Connection lines -->
  <line x1="96" y1="119" x2="122" y2="119" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="178" y1="119" x2="222" y2="119" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Label -->
  <text x="150" y="186" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">
    Chưa kết nối thiết bị
  </text>
  <text x="150" y="204" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">
    Nhập WS URL từ thiết bị khác
  </text>
  <text x="150" y="220" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">
    để kết nối qua mạng LAN
  </text>
</svg>
