<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Chart container -->
  <rect x="30" y="20" width="240" height="160" rx="12" fill="#1A1A2E" stroke="#374151" stroke-width="1.5"/>

  <!-- Grid lines (horizontal) -->
  <line x1="50" y1="60"  x2="250" y2="60"  stroke="#374151" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="90"  x2="250" y2="90"  stroke="#374151" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="120" x2="250" y2="120" stroke="#374151" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="150" x2="250" y2="150" stroke="#374151" stroke-width="1"/>

  <!-- Bars (empty/placeholder) -->
  <rect x="60"  y="100" width="26" height="50" rx="6" fill="url(#bar1)"/>
  <rect x="96"  y="120" width="26" height="30" rx="6" fill="url(#bar1)"/>
  <rect x="132" y="80"  width="26" height="70" rx="6" fill="url(#bar2)"/>
  <rect x="168" y="110" width="26" height="40" rx="6" fill="url(#bar3)"/>
  <rect x="204" y="90"  width="26" height="60" rx="6" fill="url(#bar1)"/>

  <!-- Question marks overlay -->
  <text x="73"  y="92"  text-anchor="middle" font-size="14" fill="#374151">?</text>
  <text x="109" y="114" text-anchor="middle" font-size="14" fill="#374151">?</text>
  <text x="145" y="72"  text-anchor="middle" font-size="14" fill="#374151">?</text>
  <text x="181" y="104" text-anchor="middle" font-size="14" fill="#374151">?</text>
  <text x="217" y="84"  text-anchor="middle" font-size="14" fill="#374151">?</text>

  <!-- Legend -->
  <circle cx="70"  cy="35" r="5" fill="#6C63FF" fill-opacity="0.5"/>
  <text x="80" y="39" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Likes</text>
  <circle cx="120" cy="35" r="5" fill="#EC4899" fill-opacity="0.5"/>
  <text x="130" y="39" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Follows</text>
  <circle cx="180" cy="35" r="5" fill="#10B981" fill-opacity="0.5"/>
  <text x="190" y="39" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Videos</text>

  <!-- Label -->
  <text x="150" y="204" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">
    Chưa có dữ liệu
  </text>
  <text x="150" y="222" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">
    Stats sẽ xuất hiện sau khi farm
  </text>
</svg>
