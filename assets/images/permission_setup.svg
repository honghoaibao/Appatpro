<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#4B44CC"/>
    </linearGradient>
    <linearGradient id="lock-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1F2937"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C63FF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rings -->
  <circle cx="160" cy="110" r="100" fill="none" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.08"/>
  <circle cx="160" cy="110" r="75"  fill="none" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Shield shape -->
  <path d="M 160 20 L 220 50 L 220 110 Q 220 155 160 185 Q 100 155 100 110 L 100 50 Z"
        fill="url(#shield-grad)" filter="url(#soft-shadow)"/>
  <!-- Shield inner highlight -->
  <path d="M 160 30 L 212 56 L 212 110 Q 212 148 160 174 Q 108 148 108 110 L 108 56 Z"
        fill="white" fill-opacity="0.07"/>

  <!-- Lock body (inside shield) -->
  <rect x="138" y="100" width="44" height="36" rx="8"
        fill="url(#lock-body)" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Lock shackle -->
  <path d="M 148 100 L 148 88 Q 148 74 160 74 Q 172 74 172 88 L 172 100"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Keyhole -->
  <circle cx="160" cy="116" r="5" fill="white" fill-opacity="0.7"/>
  <rect x="158" y="116" width="4" height="8" rx="2" fill="white" fill-opacity="0.7"/>

  <!-- Checkmark (granted permissions) -->
  <!-- Step 1 done -->
  <g transform="translate(16, 76)">
    <rect width="90" height="28" rx="8" fill="#10B981" fill-opacity="0.12"
          stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="14" cy="14" r="8" fill="#10B981" fill-opacity="0.3"/>
    <polyline points="9,14 13,18 19,10" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="18" font-family="system-ui,sans-serif" font-size="10" fill="#10B981">Accessibility</text>
  </g>

  <!-- Step 2 pending -->
  <g transform="translate(214, 76)">
    <rect width="90" height="28" rx="8" fill="#F59E0B" fill-opacity="0.12"
          stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="14" cy="14" r="8" fill="#F59E0B" fill-opacity="0.3"/>
    <text x="14" y="18" text-anchor="middle" font-size="10" fill="#F59E0B">!</text>
    <text x="28" y="18" font-family="system-ui,sans-serif" font-size="10" fill="#F59E0B">Overlay</text>
  </g>

  <!-- Arrow from step1 to shield -->
  <path d="M 106 90 Q 120 90 120 100" fill="none" stroke="#10B981" stroke-width="1.5"
        stroke-opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Arrow from shield to step2 -->
  <path d="M 200 100 Q 200 90 214 90" fill="none" stroke="#F59E0B" stroke-width="1.5"
        stroke-opacity="0.4" stroke-dasharray="3,3"/>

  <!-- AT PRO badge at bottom of shield -->
  <rect x="136" y="156" width="48" height="16" rx="8" fill="white" fill-opacity="0.15"/>
  <text x="160" y="168" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" letter-spacing="1">
    AT PRO
  </text>

  <!-- Labels -->
  <text x="160" y="210" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#9CA3AF">
    Cấp quyền để bắt đầu
  </text>
  <text x="160" y="228" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="11" fill="#6B7280">
    AT PRO cần Accessibility Service để hoạt động
  </text>
</svg>
