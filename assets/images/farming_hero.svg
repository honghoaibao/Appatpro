<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="phone-screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="progress-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background blob -->
  <ellipse cx="180" cy="140" rx="150" ry="110" fill="url(#hero-bg)"/>

  <!-- Floating cards (stats) -->
  <!-- Likes card -->
  <g transform="translate(18, 60)">
    <rect width="80" height="44" rx="10" fill="#1A1A2E" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="16" cy="22" r="10" fill="#EC4899" fill-opacity="0.2"/>
    <text x="16" y="26" text-anchor="middle" font-size="12" fill="#EC4899">♥</text>
    <text x="46" y="17" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">128</text>
    <text x="46" y="30" font-family="system-ui,sans-serif" font-size="9"  fill="#9CA3AF">Likes</text>
  </g>

  <!-- Follows card -->
  <g transform="translate(262, 48)">
    <rect width="80" height="44" rx="10" fill="#1A1A2E" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="16" cy="22" r="10" fill="#10B981" fill-opacity="0.2"/>
    <text x="16" y="26" text-anchor="middle" font-size="11" fill="#10B981">+</text>
    <text x="46" y="17" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">47</text>
    <text x="46" y="30" font-family="system-ui,sans-serif" font-size="9"  fill="#9CA3AF">Follows</text>
  </g>

  <!-- Videos card -->
  <g transform="translate(18, 168)">
    <rect width="80" height="44" rx="10" fill="#1A1A2E" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="16" cy="22" r="10" fill="#F59E0B" fill-opacity="0.2"/>
    <text x="16" y="26" text-anchor="middle" font-size="10" fill="#F59E0B">▶</text>
    <text x="46" y="17" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">312</text>
    <text x="46" y="30" font-family="system-ui,sans-serif" font-size="9"  fill="#9CA3AF">Videos</text>
  </g>

  <!-- Account badge -->
  <g transform="translate(262, 168)">
    <rect width="80" height="44" rx="10" fill="#1A1A2E" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="16" cy="22" r="10" fill="#6C63FF" fill-opacity="0.2"/>
    <text x="16" y="26" text-anchor="middle" font-size="10" fill="#6C63FF">@</text>
    <text x="32" y="19" font-family="system-ui,sans-serif" font-size="9"  fill="#9CA3AF">Account</text>
    <text x="32" y="31" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="white">acc3/8</text>
  </g>

  <!-- Center phone -->
  <g transform="translate(118, 30)">
    <!-- Phone shadow -->
    <ellipse cx="62" cy="230" rx="40" ry="8" fill="#6C63FF" fill-opacity="0.15"/>
    <!-- Phone body -->
    <rect width="124" height="220" rx="20" fill="#1A1A2E" stroke="#374151" stroke-width="2"/>
    <!-- Side buttons -->
    <rect x="-3" y="60"  width="4" height="20" rx="2" fill="#374151"/>
    <rect x="-3" y="88"  width="4" height="20" rx="2" fill="#374151"/>
    <rect x="123" y="70" width="4" height="30" rx="2" fill="#374151"/>
    <!-- Dynamic island -->
    <rect x="40" y="10" width="44" height="12" rx="6" fill="#0D0D14"/>
    <circle cx="56" cy="16" r="3" fill="#1A1A2E"/>
    <!-- Screen -->
    <rect x="8" y="28" width="108" height="172" rx="12" fill="url(#phone-screen)"/>
    <!-- TikTok app content on screen -->
    <!-- Video frame -->
    <rect x="8" y="28" width="108" height="172" rx="12" fill="#0D0D14"/>
    <!-- Video content blocks -->
    <rect x="14" y="34"  width="96" height="90" rx="6" fill="#1A1A2E"/>
    <text x="62" y="86" text-anchor="middle" font-size="28" fill="#374151">▶</text>
    <!-- User info row -->
    <circle cx="26" cy="142" r="10" fill="#6C63FF" fill-opacity="0.5"/>
    <rect x="40" y="136" width="50" height="6" rx="3" fill="#374151"/>
    <rect x="40" y="146" width="36" height="5" rx="2.5" fill="#374151" fill-opacity="0.6"/>
    <!-- Progress bar -->
    <rect x="14" y="160" width="96" height="4" rx="2" fill="#374151"/>
    <rect x="14" y="160" width="60" height="4" rx="2" fill="url(#progress-bar)"/>
    <!-- Action buttons right side -->
    <text x="102" y="72"  text-anchor="middle" font-size="14" fill="#EC4899">♥</text>
    <text x="102" y="86"  text-anchor="middle" font-size="10" fill="#9CA3AF">128</text>
    <text x="102" y="102" text-anchor="middle" font-size="12" fill="#9CA3AF">💬</text>
    <text x="102" y="116" text-anchor="middle" font-size="10" fill="#9CA3AF">24</text>
    <text x="102" y="132" text-anchor="middle" font-size="12" fill="#9CA3AF">↗</text>
    <!-- Bottom nav bar -->
    <rect x="8" y="186" width="108" height="14" rx="0" fill="#1A1A2E"/>
    <text x="28"  y="196" text-anchor="middle" font-size="9" fill="#9CA3AF">🏠</text>
    <text x="48"  y="196" text-anchor="middle" font-size="9" fill="#9CA3AF">🔍</text>
    <text x="62"  y="196" text-anchor="middle" font-size="12" fill="#6C63FF">+</text>
    <text x="76"  y="196" text-anchor="middle" font-size="9" fill="#9CA3AF">📬</text>
    <text x="96"  y="196" text-anchor="middle" font-size="9" fill="#9CA3AF">👤</text>
    <!-- Live indicator dot -->
    <circle cx="106" cy="32" r="5" fill="#10B981" filter="url(#glow)"/>
    <!-- Home indicator -->
    <rect x="42" y="210" width="40" height="3" rx="1.5" fill="#374151"/>
  </g>

  <!-- Connecting lines (animated in Flutter) -->
  <line x1="98"  y1="82"  x2="120" y2="100" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="262" y1="70"  x2="242" y2="100" stroke="#10B981" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="98"  y1="190" x2="120" y2="175" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>
  <line x1="262" y1="190" x2="242" y2="175" stroke="#6C63FF" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5"/>

  <!-- Bottom "Farming..." label -->
  <rect x="118" y="258" width="124" height="20" rx="10" fill="#6C63FF" fill-opacity="0.15"/>
  <circle cx="133" cy="268" r="4" fill="#10B981"/>
  <text x="143" y="272" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#9CA3AF">Đang farm...</text>
</svg>
